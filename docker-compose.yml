services:
  mongodb:
    image: mongo:7.0
    container_name: careercompass-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: careercompass
    volumes:
      - mongodb_data:/data/db
    networks:
      - careercompass-network

  redis:
    image: redis:7-alpine
    container_name: careercompass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careercompass-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  careercompass-network:
    driver: bridge
