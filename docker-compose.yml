services:
  # Shared Infrastructure
  mongodb:
    image: mongo:7.0
    container_name: careercompass-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: careercompass
    volumes:
      - mongodb_data:/data/db
    networks:
      - careercompass-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: careercompass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - careercompass-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Express Backend
  express-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: careercompass-express
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/careercompass
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - express_uploads:/app/uploads
    networks:
      - careercompass-network

  # FastAPI Backend
  fastapi-backend:
    build:
      context: .
      dockerfile: fastapi-backend/Dockerfile
    container_name: careercompass-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/careercompass
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - fastapi_uploads:/app/uploads
    networks:
      - careercompass-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: careercompass-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://express-backend:3001
      - NEXT_PUBLIC_FASTAPI_URL=http://fastapi-backend:8000
    depends_on:
      - express-backend
      - fastapi-backend
    networks:
      - careercompass-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  express_uploads:
    driver: local
  fastapi_uploads:
    driver: local

networks:
  careercompass-network:
    driver: bridge
